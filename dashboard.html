<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GitHub Issues Tracker</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <nav class="bg-white shadow-sm">
      <div
        class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center"
      >
        <div class="flex items-center gap-3">
          <img src="assets/github-logo.png" class="w-8" />

          <h1 class="text-lg font-semibold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-2">
          <input
            id="searchInput"
            type="text"
            placeholder="Search issues..."
            class="border rounded-md px-3 py-2 w-60"
          />

          <button
            id="searchBtn"
            class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700"
          >
            Search
          </button>
        </div>
      </div>
    </nav>

    <div class="max-w-6xl mx-auto mt-6 px-4">
      <div class="bg-white rounded-lg shadow p-4">
        <div class="flex gap-3 mb-4">
          <button
            id="allTab"
            class="px-4 py-2 rounded-md bg-purple-600 text-white"
          >
            All
          </button>

          <button id="openTab" class="px-4 py-2 rounded-md border">Open</button>

          <button id="closedTab" class="px-4 py-2 rounded-md border">
            Closed
          </button>
        </div>

        <div class="flex justify-between items-center border-t pt-4">
          <div class="flex items-center gap-3">
            <img src="assets/Aperture.png" class="w-6" />

            <div>
              <p class="font-semibold">54 Issues</p>

              <p class="text-sm text-gray-500">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="flex items-center gap-4 text-sm">
            <div class="flex items-center gap-2">
              <img src="assets/Open-Status.png" class="w-4" />

              <span>Open</span>
            </div>

            <div class="flex items-center gap-2">
              <img src="assets/Closed- Status .png" class="w-4" />

              <span>Closed</span>
            </div>
          </div>
        </div>
      </div>

      <div id="loadingSpinner" class="text-center mt-10 hidden">
        <p class="text-gray-500">loading issues...</p>
      </div>

      <div id="noResultsMessage" class="text-center mt-10 hidden">
        <p class="text-gray-500 text-lg font-medium">Nothing Found</p>
      </div>

      <div id="issuesContainer" class="grid grid-cols-4 gap-6 mt-6"></div>
    </div>
    <div
      id="issueModal"
      class="fixed inset-0 bg-black/40 hidden items-center justify-center"
    >
      <div class="bg-white rounded-lg shadow-lg w-[500px] p-6">
        <h2 id="modalTitle" class="text-xl font-semibold mb-2"></h2>

        <div class="flex items-center gap-2 text-sm text-gray-500 mb-3">
          <span id="modalStatus"></span>
          <span id="modalAuthor"></span>
          <span id="modalDate"></span>
        </div>

        <div id="modalLabels" class="flex gap-2 mb-4 flex-wrap"></div>

        <p id="modalDescription" class="text-gray-600 mb-5"></p>

        <div class="flex justify-between bg-gray-100 p-3 rounded mb-5">
          <div>
            <p class="text-xs text-gray-500">Assignee</p>
            <p id="modalAssignee" class="font-medium"></p>
          </div>

          <div>
            <p class="text-xs text-gray-500">Priority</p>
            <span
              id="modalPriority"
              class="px-2 py-1 rounded text-xs bg-gray-200"
            ></span>
          </div>
        </div>

        <div class="text-right">
          <button
            id="closeModalBtn"
            class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700"
          >
            Close
          </button>
        </div>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
