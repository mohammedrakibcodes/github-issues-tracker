<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-lg rounded-xl w-[380px] p-8 text-center">
      <img src="assets/github-logo.png" class="w14 mx-auto mb-4" />

      <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
      <p class="text-gray-600 text-sm mb-6">Sign into manage your accounts</p>

      <form id="loginForm" class="space-y-4">
        <div class="text-left">
          <label class="text-sm-font-medium">Username</label>
          <input
            type="text"
            id="usernameInput"
            placeholder="Enter username"
            class="w-full border rounded-md px-3 py-2 mt-1"
          />
          <p class="text-xs text-purple-600 mt-1">Default: admin</p>
        </div>

        <div class="text-left">
          <label class="text-sm font-medium"> Password</label>
          <input
            type="password"
            id="passwordInput"
            placeholder="Enter password"
            class="w-full border rounded-md px-3 py-2 mt-1"
          />
          <p class="text-xs text-purple-600 mt-1">Default: admin123</p>
        </div>

        <button
          type="submit"
          class="w-full mt-2 bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-md"
        >
          Sign in
        </button>
      </form>

      <div class="flex items-center my-5">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="px-3 text-gray-500 text-xm">OR</span>
        <div class="flex-1 h-px bg-gray-300"></div>
      </div>

      <div class="bg-gray-100 rounded-md p-3 text-sm">
        <p class="font-medium">Demo Credentials</p>
        <p>Username: admin</p>
        <p>Password: admin123</p>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
